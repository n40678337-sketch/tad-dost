<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"><title>Тад Дост — Магазин</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
    .product { border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .cart { background: #f0fdf4; padding: 16px; border-radius: 8px; margin: 20px 0; }
    button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; }
    .add-btn { background: #3b82f6; color: white; }
    .remove-btn { background: #ef4444; color: white; }
    .order-btn { background: #22c55e; color: white; font-size: 18px; padding: 12px 24px; width: 100%; }
    input { width: 100%; margin: 6px 0; padding: 10px; box-sizing: border-box; }
    .success { color: green; font-weight: bold; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>🛒 Тад Дост — Магазин</h1>
  <div id="productList"></div>
  <div class="cart">
    <h3>🛒 Кошик</h3>
    <div id="cartItems">Порожньо</div>
    <p>Загалом: <strong id="totalPrice">0</strong> грн</p>
  </div>
  <h3>Оформлення</h3>
  <input type="text" id="name" placeholder="Ім'я">
  <input type="text" id="phone" placeholder="Телефон">
  <input type="text" id="address" placeholder="Адреса">
  <button class="order-btn" id="orderBtn">Замовити</button>
  <div id="message" class="success"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const products = [
      { id: 1, name: "Піца Маргарита", price: 150 },
      { id: 2, name: "Суші сет", price: 320 },
      { id: 3, name: "Бургер", price: 90 },
      { id: 4, name: "Салат Цезар", price: 110 }
    ];
    let cart = [];

    document.getElementById('productList').innerHTML = products.map(p => `
      <div class="product">
        <span>${p.name} — ${p.price} грн</span>
        <button class="add-btn" data-id="${p.id}">Додати</button>
      </div>`).join('');

    document.getElementById('productList').addEventListener('click', e => {
      if (e.target.classList.contains('add-btn')) {
        const id = parseInt(e.target.dataset.id);
        const product = products.find(p => p.id === id);
        const existing = cart.find(item => item.id === id);
        if (existing) existing.qty++;
        else cart.push({ ...product, qty: 1 });
        renderCart();
      }
    });

    function renderCart() {
      const cartDiv = document.getElementById('cartItems');
      const totalSpan = document.getElementById('totalPrice');
      if (!cart.length) {
        cartDiv.innerHTML = 'Порожньо';
        totalSpan.textContent = '0';
        return;
      }
      let total = 0;
      cartDiv.innerHTML = cart.map(item => {
        const sum = item.price * item.qty;
        total += sum;
        return `<div>${item.name} x${item.qty} = ${sum} грн 
          <button class="remove-btn" data-id="${item.id}">×</button></div>`;
      }).join('');
      document.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          const id = parseInt(e.target.dataset.id);
          cart = cart.filter(item => item.id !== id);
          renderCart();
        });
      });
      totalSpan.textContent = total;
    }

    document.getElementById('orderBtn').addEventListener('click', () => {
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const address = document.getElementById('address').value.trim();
      if (!name || !phone || !address || !cart.length) {
        alert('Заповніть усі поля та додайте товари');
        return;
      }
      const order = {
        customer: { name, phone, address },
        items: cart.map(i => ({ name: i.name, price: i.price, qty: i.qty })),
        total: cart.reduce((sum, i) => sum + i.price * i.qty, 0)
      };
      socket.emit('new-order', order);
      socket.once('order-confirmed', (data) => {
        document.getElementById('message').textContent = '✅ Замовлення прийнято! Номер: ' + data.orderId.slice(-5);
        cart = [];
        renderCart();
      });
    });

    renderCart();
  </script>
</body>
</html>
